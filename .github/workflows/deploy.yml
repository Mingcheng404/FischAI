name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check AI environment variables (optional)
        env:
          VITE_PROBEX_API_URL: ${{ secrets.VITE_PROBEX_API_URL }}
          VITE_PROBEX_MODEL: ${{ secrets.VITE_PROBEX_MODEL }}
          VITE_PROBEX_API_KEY: ${{ secrets.VITE_PROBEX_API_KEY }}
        run: |
          # Secrets are optional: the app runs without them (AI shows "not configured").
          # Requiring them here caused every Pages deploy to fail for forks and new repos.
          missing=0
          if [ -z "$VITE_PROBEX_API_KEY" ]; then
            echo "::warning::Secret VITE_PROBEX_API_KEY is not set — remote AI chat will be disabled until you add it in Repo settings → Secrets."
            missing=1
          fi
          if [ -z "$VITE_PROBEX_API_URL" ]; then
            echo "::warning::Secret VITE_PROBEX_API_URL is not set — using app default URL only if key is set."
            missing=1
          fi
          if [ -z "$VITE_PROBEX_MODEL" ]; then
            echo "::warning::Secret VITE_PROBEX_MODEL is not set — using app default model only if key is set."
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "AI repository secrets are configured; they will be baked into the production build."
          fi

      - name: Build
        run: npm run build
        env:
          VITE_PROBEX_API_URL: ${{ secrets.VITE_PROBEX_API_URL }}
          VITE_PROBEX_MODEL: ${{ secrets.VITE_PROBEX_MODEL }}
          VITE_PROBEX_API_KEY: ${{ secrets.VITE_PROBEX_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



